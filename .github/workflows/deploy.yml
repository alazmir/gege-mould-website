name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: node build.js

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq ncftp
          echo "=== dist/ contents ==="
          ls dist/
          echo "=== Deploying to $REMOTE_DIR ==="
          cd dist
          ncftpput -R -v -u "$FTP_USER" -p "$FTP_PASS" "$FTP_HOST" "$REMOTE_DIR" .
          echo "=== Deploy complete ==="
