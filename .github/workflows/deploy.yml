name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: node build.js

      - name: Debug FTP connection
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          echo "FTP_HOST=$FTP_HOST"
          echo "FTP_USER=$FTP_USER"
          echo "REMOTE_DIR=$REMOTE_DIR"
          echo "FTP_PASS length=$(echo -n "$FTP_PASS" | wc -c)"
          echo "=== Testing curl FTP list ==="
          curl -v --ftp-pasv --list-only "ftp://$FTP_HOST/$REMOTE_DIR" --user "$FTP_USER:$FTP_PASS" 2>&1 || echo "List failed (may be OK if dir empty)"
          echo "=== Testing upload of a single test file ==="
          echo "test" > test_upload.txt
          curl -v --ftp-pasv -T test_upload.txt "ftp://$FTP_HOST/$REMOTE_DIR/test_upload.txt" --user "$FTP_USER:$FTP_PASS" 2>&1
          echo "=== Test complete ==="
