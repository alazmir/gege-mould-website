name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: node build.js

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          set -e
          echo "=== dist/ contents ==="
          ls dist/ && ls dist/css/ && ls dist/js/

          echo "=== Uploading via curl ==="
          cd dist
          TOTAL=0
          FAILED=0

          for file in $(find . -type f | sed 's|^\./||'); do
            TOTAL=$((TOTAL + 1))
            if curl -s --fail -T "$file" "ftp://$FTP_HOST/$REMOTE_DIR$file" --user "$FTP_USER:$FTP_PASS" --ftp-create-dirs; then
              echo "[OK] $file"
            else
              echo "[FAIL] $file"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "=== Upload complete: $((TOTAL - FAILED))/$TOTAL files ==="
          if [ $FAILED -gt 0 ]; then
            echo "ERROR: $FAILED files failed to upload"
            exit 1
          fi
          echo "All files deployed successfully."
