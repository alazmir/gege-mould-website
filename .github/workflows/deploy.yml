name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: node build.js

      - name: Deploy to Hostinger via FTPS
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          set -e

          echo "=== Checking secrets ==="
          [[ -n "$FTP_HOST" ]] && echo "FTP_HOST: YES (${#FTP_HOST} chars)" || { echo "FTP_HOST: MISSING"; exit 1; }
          [[ -n "$FTP_USER" ]] && echo "FTP_USER: YES (${#FTP_USER} chars)" || { echo "FTP_USER: MISSING"; exit 1; }
          [[ -n "$FTP_PASS" ]] && echo "FTP_PASS: YES (${#FTP_PASS} chars)" || { echo "FTP_PASS: MISSING"; exit 1; }
          [[ -n "$REMOTE_DIR" ]] && echo "REMOTE_DIR: YES (${#REMOTE_DIR} chars)" || { echo "REMOTE_DIR: MISSING"; exit 1; }

          echo ""
          echo "=== Installing lftp ==="
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp

          # Ensure REMOTE_DIR ends with /
          RDIR="${REMOTE_DIR%/}/"

          echo ""
          echo "Remote directory: $RDIR"

          echo ""
          echo "=== Uploading HTML, CSS, JS first ==="
          cd dist
          lftp -c "
            set ftp:ssl-auth TLS;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 2;
            open -u $FTP_USER,$FTP_PASS $FTP_HOST;
            mirror -R -v ./ $RDIR;
          "

          echo ""
          echo "=== DEPLOY COMPLETE ==="

          echo ""
          echo "=== DEPLOY COMPLETE ==="
