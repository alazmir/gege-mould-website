name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: node build.js

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          set -e
          echo "Installing lftp..."
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          echo "Writing FTP script..."
          printf 'set ftp:ssl-allow yes\n'                > deploy.lftp
          printf 'set ssl:verify-certificate no\n'        >> deploy.lftp
          printf 'open -u "%s","%s" %s\n' "$FTP_USER" "$FTP_PASS" "$FTP_HOST" >> deploy.lftp
          printf 'mirror -R -v -e ./dist/ %s\n' "$REMOTE_DIR" >> deploy.lftp
          echo "Running lftp..."
          lftp -f deploy.lftp
          echo "Deploy complete."
