name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: node build.js

      - name: Deploy to Hostinger via FTP
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -e "
            set ftp:ssl-allow yes;
            mirror --reverse --delete --verbose ./dist/ ${{ secrets.HOSTINGER_REMOTE_DIR }};
            quit
          " -u "${{ secrets.HOSTINGER_FTP_USER }}","${{ secrets.HOSTINGER_FTP_PASSWORD }}" \
            ${{ secrets.HOSTINGER_FTP_HOST }}
