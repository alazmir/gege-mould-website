name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: node build.js

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          set -e

          HOST="$FTP_HOST"
          USER="$FTP_USER"
          PASS="$FTP_PASS"
          RDIR="$REMOTE_DIR"

          # Ensure REMOTE_DIR ends with /
          [[ "$RDIR" != */ ]] && RDIR="$RDIR/"

          echo "Host: $HOST"
          echo "User: $USER"
          echo "Remote dir: $RDIR"
          echo "Password length: ${#PASS}"

          # Test connection with a simple upload
          echo "=== Testing FTP upload ==="
          echo "test" > /tmp/ftp_test.txt
          if curl -v --ftp-pasv --max-time 30 -T /tmp/ftp_test.txt "ftp://$HOST/${RDIR}ftp_test.txt" --user "$USER:$PASS" --ftp-create-dirs 2>&1; then
            echo "=== Connection OK! ==="
          else
            echo "=== Connection FAILED! ==="
            exit 1
          fi

          # Now deploy everything
          echo "=== Deploying all files ==="
          cd dist
          FILES=0
          FAILS=0

          find . -type f | while IFS= read -r file; do
            rel="${file#./}"
            if curl -s --ftp-pasv --max-time 120 -T "$rel" "ftp://$HOST/${RDIR}$rel" --user "$USER:$PASS" --ftp-create-dirs; then
              echo "[OK] $rel"
            else
              echo "[FAIL] $rel"
              exit 1
            fi
          done

          echo "=== Deploy complete ==="
