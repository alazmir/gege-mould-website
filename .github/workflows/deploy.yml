name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: node build.js

      - name: Install FTP deploy tool
        run: npm install basic-ftp

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          LOCAL_DIR: dist
        run: |
          # Verify secrets are set (masked output)
          echo "FTP_HOST present: $([[ -n "$FTP_HOST" ]] && echo YES || echo 'NO — SECRET NOT SET')"
          echo "FTP_USER present: $([[ -n "$FTP_USER" ]] && echo YES || echo 'NO — SECRET NOT SET')"
          echo "FTP_PASS present: $([[ -n "$FTP_PASS" ]] && echo YES || echo 'NO — SECRET NOT SET')"
          echo "REMOTE_DIR present: $([[ -n "$REMOTE_DIR" ]] && echo YES || echo 'NO — SECRET NOT SET')"
          echo "FTP_HOST length: ${#FTP_HOST}"
          echo "FTP_USER length: ${#FTP_USER}"
          echo "FTP_PASS length: ${#FTP_PASS}"
          echo ""
          node deploy-ftp.js
